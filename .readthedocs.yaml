build:
  apt_packages:
    - 'libcairo2-dev'
    - 'libgirepository-2.0-dev'
  jobs:
    post_install:
      - 'pip install uv'
      - 'UV_PROJECT_ENVIRONMENT="$READTHEDOCS_VIRTUALENV_PATH" uv sync --group docs --inexact --all-extras --no-dev'
  os: 'ubuntu-24.04'
  tools:
    python: '3.12'
sphinx:
  configuration: 'docs/conf.py'
  fail_on_warning: true
version: 2
